<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Now Playing</title>
  <link rel="stylesheet" href="/style.css?v=6">
</head>
<body>
  <main class="screen">
    <section class="art-wrap" aria-label="Album art">
      <div id="artFallback" class="art-fallback"></div>
      <img id="albumArt" class="album-art" alt="" hidden>
    </section>
  </main>

  <footer class="player" aria-label="Playback controls">
    <div class="topline">
      <div class="meta">
        <div id="track" class="track">Nothing playing</div>
        <div id="artist" class="artist"></div>
      </div>
      <div id="state" class="state paused" aria-label="Playback state"><span></span><span></span><span></span><span></span></div>
    </div>

    <div class="progress">
      <span id="elapsed">0:00</span>
      <button id="seekBar" class="bar" aria-label="Seek" type="button"><span id="barFill"></span></button>
      <span id="duration">0:00</span>
    </div>

    <div class="controls">
      <button id="previous" class="control skip" type="button" aria-label="Previous track">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 6h2v12H7zM18 6v12L9.5 12z"/></svg>
      </button>
      <button id="playPause" class="control play" type="button" aria-label="Play or pause">
        <svg id="playIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" aria-hidden="true" hidden><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>
      </button>
      <button id="next" class="control skip" type="button" aria-label="Next track">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6h2v12h-2zM6 18V6l8.5 6z"/></svg>
      </button>
      <button id="repeat" class="control repeat" type="button" aria-label="Repeat">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h9.2l-2.1-2.1L15.5 3.5 20 8l-4.5 4.5-1.4-1.4L16.2 9H7a3 3 0 0 0-3 3v1H2v-1a5 5 0 0 1 5-5zm10 10H7.8l2.1 2.1-1.4 1.4L4 16l4.5-4.5 1.4 1.4L7.8 15H17a3 3 0 0 0 3-3v-1h2v1a5 5 0 0 1-5 5z"/></svg>
      </button>
    </div>

    <div id="notice" class="notice" role="status" aria-live="polite"></div>
    <p id="album" class="album">Start playback from your phone.</p>
  </footer>

  <script src="/app.js?v=6"></script>
</body>
</html>
